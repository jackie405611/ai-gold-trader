name: Trading Bot Tick (Every Minute)

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Call Vercel tick endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://ai-gold-trader.vercel.app/api/cron/tick
